<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數位創新期末複習系統</title>
<style>
:root {
  --bg:#f7f2ff; --card:#ffffff; --text:#2d2438; --muted:#7b6f88;
  --primary:#8b5cf6; --primary2:#a78bfa; --good:#16a34a; --bad:#dc2626;
  --line:#e9ddff; --soft:#f1eaff;
}
body.dark {
  --bg:#15111d; --card:#211a2d; --text:#f6efff; --muted:#c8b9d8;
  --primary:#c4b5fd; --primary2:#8b5cf6; --line:#3a2d50; --soft:#2c223b;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;padding:16px 18px;box-shadow:0 3px 16px rgba(0,0,0,.16)}
.header-inner{max-width:1180px;margin:auto;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
h1{font-size:24px;margin:0} .sub{font-size:13px;opacity:.95}
.wrap{max-width:1180px;margin:18px auto;padding:0 14px}
.tabs{display:flex;gap:8px;overflow:auto;padding:8px 0 14px;position:sticky;top:86px;background:var(--bg);z-index:8}
.tab{border:1px solid var(--line);background:var(--card);color:var(--text);padding:10px 13px;border-radius:999px;white-space:nowrap;cursor:pointer;font-weight:700}
.tab.active{background:var(--primary);color:white;border-color:var(--primary)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 6px 20px rgba(86,44,140,.08)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
@media(max-width:720px){.grid{grid-template-columns:1fr}h1{font-size:20px}.tabs{top:94px}}
@media(min-width:900px){.quiz-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}}
h2{margin:4px 0 12px} h3{margin:8px 0;color:var(--primary)}
.page{display:none} .page.active{display:block}
.pill{display:inline-block;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:4px 10px;margin:3px;color:var(--text)}
.question{border:1px solid var(--line);border-radius:16px;padding:14px;background:var(--card);margin:0 0 12px}
.q-title{font-weight:800;margin-bottom:10px}
.option{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--soft);color:var(--text);padding:11px 12px;border-radius:12px;margin:8px 0;cursor:pointer;font-size:16px}
.option:hover{border-color:var(--primary)}
.option.correct{border-color:var(--good);background:rgba(22,163,74,.12)}
.option.wrong{border-color:var(--bad);background:rgba(220,38,38,.12)}
.result{font-weight:800;margin-top:8px;display:none}
.good{color:var(--good)} .bad{color:var(--bad)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
.btn{border:0;background:var(--primary);color:white;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}
.btn.secondary{background:var(--soft);color:var(--text);border:1px solid var(--line)}
details{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}
summary{cursor:pointer;font-weight:800}
.scorebox{font-size:18px;font-weight:800}
.small{font-size:13px;color:var(--muted)}
.mock-card{max-width:760px;margin:auto}
.footer{text-align:center;color:var(--muted);padding:22px}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>📚 數位創新期末複習系統</h1>
      <div class="sub">老師簡答題＋第4～10章選擇題＋綜合模擬考</div>
    </div>
    <button class="btn secondary" onclick="toggleDark()">🌙 深色模式</button>
  </div>
</header>
<div class="wrap">
  <div id="tabs" class="tabs"></div>
  <main id="content"></main>
</div>
<div class="footer">考前刷題版｜手機、平板、電腦皆可用</div>

let stats = {correct:0, wrong:0};
let mockQuestions = [];
let mockIndex = 0;
let mockScore = 0;

const pages = [
  ["home","🏠 必考重點"],
  ["short","📝 老師簡答題"],
  ["shortQuiz","🎯 簡答變選擇"],
  ...Object.keys(DATA.chapters).map((c,i)=>["ch"+i,"📖 "+c]),
  ["mock","🎲 綜合模擬考"],
  ["score","📊 成績"]
];

function init(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = pages.map(p=>`<button class="tab" id="tab-${p[0]}" onclick="showPage('${p[0]}')">${p[1]}</button>`).join("");
  showPage("home");
}

function toggleDark(){ document.body.classList.toggle("dark"); }

function showPage(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const tab = document.getElementById("tab-"+id); if(tab) tab.classList.add("active");
  const content = document.getElementById("content");
  if(id==="home") content.innerHTML = renderHome();
  else if(id==="short") content.innerHTML = renderShort();
  else if(id==="shortQuiz") content.innerHTML = renderQuiz(DATA.shortQuiz, "shortQuiz");
  else if(id.startsWith("ch")){
    const idx = parseInt(id.replace("ch",""));
    const key = Object.keys(DATA.chapters)[idx];
    content.innerHTML = renderQuiz(DATA.chapters[key], id, key);
  }
  else if(id==="mock"){ startMock(); return; }
  else if(id==="score") content.innerHTML = renderScore();
}

function renderHome(){
  return `<section class="card">
    <h2>🏠 必考重點</h2>
    <p>考前 5 分鐘先看這裡，都是老師給的簡答題主題。</p>
    <div class="grid">
      ${DATA.shortAnswers.map(s=>`<div class="card"><h3>${s.title}</h3>${s.answers.map(a=>`<span class="pill">${a}</span>`).join("")}</div>`).join("")}
    </div>
  </section>`;
}

function renderShort(){
  return `<section class="card">
    <h2>📝 老師簡答題背誦</h2>
    <p class="small">點開題目就可以看答案。</p>
    ${DATA.shortAnswers.map((s,i)=>`<details><summary>${i+1}. ${s.title}</summary><ol>${s.answers.map(a=>`<li>${a}</li>`).join("")}</ol></details>`).join("")}
  </section>`;
}

function renderQuiz(list, scope, title=""){
  return `<section class="card">
    <h2>${title || "老師簡答題 → 選擇題"}</h2>
    <div class="toolbar">
      <button class="btn secondary" onclick="resetQuiz('${scope}')">重新作答本頁</button>
      <span class="small">答完會立即顯示正確答案</span>
    </div>
    <div class="quiz-list">
    ${list.map((q,i)=>renderQuestion(q,i,scope)).join("")}
    </div>
  </section>`;
}

function renderQuestion(q,i,scope){
  const letters=["A","B","C","D"];
  return `<div class="question" data-scope="${scope}">
    <div class="q-title">${i+1}. ${q.q}</div>
    ${q.opts.map((o,idx)=>`<button class="option" onclick="answer(this, ${idx}, ${q.ans})">${letters[idx]}. ${o}</button>`).join("")}
    <div class="result"></div>
  </div>`;
}

function answer(btn, chosen, ans){
  const box = btn.closest(".question");
  if(box.dataset.done==="1") return;
  box.dataset.done="1";
  const opts = [...box.querySelectorAll(".option")];
  opts.forEach((b,i)=>{ if(i===ans) b.classList.add("correct"); });
  const r = box.querySelector(".result");
  if(chosen===ans){
    btn.classList.add("correct"); r.innerHTML="✅ 正確"; r.className="result good"; stats.correct++;
  } else {
    btn.classList.add("wrong"); r.innerHTML="❌ 答錯，正確答案是："+opts[ans].innerText; r.className="result bad"; stats.wrong++;
  }
  r.style.display="block";
}

function resetQuiz(scope){
  document.querySelectorAll(`[data-scope="${scope}"]`).forEach(box=>{
    box.dataset.done="";
    box.querySelectorAll(".option").forEach(o=>o.classList.remove("correct","wrong"));
    const r=box.querySelector(".result"); r.style.display="none"; r.innerHTML="";
  });
}

function allQuestions(){
  return [...DATA.shortQuiz, ...Object.values(DATA.chapters).flat()];
}
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }

function startMock(){
  mockQuestions = shuffle(allQuestions());
  mockIndex = 0; mockScore = 0;
  renderMock();
}

function renderMock(){
  const content = document.getElementById("content");
  if(mockIndex >= mockQuestions.length){
    const rate = Math.round(mockScore / mockQuestions.length * 100);
    content.innerHTML = `<section class="card mock-card"><h2>🎉 模擬考完成</h2>
    <p class="scorebox">答對：${mockScore} / ${mockQuestions.length}</p>
    <p class="scorebox">正確率：${rate}%</p>
    <button class="btn" onclick="startMock()">再考一次</button></section>`;
    return;
  }
  const q = mockQuestions[mockIndex];
  content.innerHTML = `<section class="card mock-card">
    <h2>🎲 綜合模擬考</h2>
    <p class="small">第 ${mockIndex+1} / ${mockQuestions.length} 題</p>
    ${renderQuestion(q, mockIndex, "mockOne")}
    <div class="toolbar"><button class="btn" id="nextMock" style="display:none" onclick="mockIndex++;renderMock()">下一題</button></div>
  </section>`;
}

document.addEventListener("click", function(e){
  if(e.target.classList.contains("option")){
    const qbox = e.target.closest(".question");
    if(qbox && qbox.dataset.scope==="mockOne"){
      const opts=[...qbox.querySelectorAll(".option")];
      const chosen=opts.indexOf(e.target);
      const correct=opts.findIndex(o=>o.classList.contains("correct"));
      if(chosen===correct) mockScore++;
      const next=document.getElementById("nextMock"); if(next) next.style.display="inline-block";
    }
  }
}, true);

function renderScore(){
  const total = stats.correct + stats.wrong;
  const rate = total ? Math.round(stats.correct / total * 100) : 0;
  return `<section class="card">
    <h2>📊 成績統計</h2>
    <p class="scorebox">目前答對：${stats.correct}</p>
    <p class="scorebox">目前答錯：${stats.wrong}</p>
    <p class="scorebox">正確率：${rate}%</p>
    <button class="btn secondary" onclick="stats={correct:0,wrong:0};showPage('score')">清除統計</button>
  </section>`;
}

init();
</script>
</body>
</html>
