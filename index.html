let current = [...allQuestions];

function initCats(){
  const cats=[...new Set(allQuestions.map(q=>q.cat))];
  const sel=document.getElementById("catFilter");
  cats.forEach(c=>{
    const op=document.createElement("option");
    op.value=c; op.textContent=c;
    sel.appendChild(op);
  });
}

function letter(i){return String.fromCharCode(65+i)}

function render(){
  const cat=document.getElementById("catFilter").value;
  current = cat==="全部" ? [...allQuestions] : allQuestions.filter(q=>q.cat===cat);
  const quiz=document.getElementById("quiz");
  quiz.innerHTML="";
  current.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="q";
    div.innerHTML=`
      <div class="tag">${item.cat}｜第 ${i+1} 題</div>
      <div class="qt">${i+1}. ${item.q}</div>
      ${item.options.map((op,idx)=>`
        <label class="op" id="q${i}_${idx}">
          <input type="radio" name="q${i}" value="${idx}">
          ${letter(idx)}. ${op}
        </label>`).join("")}
      <div class="ans" id="ans${i}">答案：${letter(item.answer)}. ${item.options[item.answer]}</div>
    `;
    quiz.appendChild(div);
  });
  document.getElementById("score").textContent="尚未批改";
  document.getElementById("count").textContent=`目前題數：${current.length} 題`;
}

function check(){
  let c=0;
  current.forEach((item,i)=>{
    item.options.forEach((_,idx)=>document.getElementById(`q${i}_${idx}`).classList.remove("correct","wrong"));
    document.getElementById(`q${i}_${item.answer}`).classList.add("correct");
    const s=document.querySelector(`input[name="q${i}"]:checked`);
    if(s){
      const v=Number(s.value);
      if(v===item.answer)c++;
      else document.getElementById(`q${i}_${v}`).classList.add("wrong");
    }
    document.getElementById(`ans${i}`).classList.add("show");
  });
  document.getElementById("score").textContent=`分數：${c} / ${current.length}`;
  window.scrollTo({top:0,behavior:"smooth"});
}

function showAns(){
  current.forEach((item,i)=>{
    item.options.forEach((_,idx)=>document.getElementById(`q${i}_${idx}`).classList.remove("wrong"));
    document.getElementById(`q${i}_${item.answer}`).classList.add("correct");
    document.getElementById(`ans${i}`).classList.add("show");
  });
  document.getElementById("score").textContent=`已顯示答案，共 ${current.length} 題`;
}

function resetQuiz(){
  document.querySelectorAll("input[type=radio]").forEach(x=>x.checked=false);
  document.querySelectorAll(".op").forEach(x=>x.classList.remove("correct","wrong"));
  document.querySelectorAll(".ans").forEach(x=>x.classList.remove("show"));
  document.getElementById("score").textContent="尚未批改";
  window.scrollTo({top:0,behavior:"smooth"});
}

function shuffleQuestions(){
  for(let i=current.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [current[i],current[j]]=[current[j],current[i]];
  }
  const quiz=document.getElementById("quiz");
  quiz.innerHTML="";
  current.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="q";
    div.innerHTML=`
      <div class="tag">${item.cat}｜第 ${i+1} 題</div>
      <div class="qt">${i+1}. ${item.q}</div>
      ${item.options.map((op,idx)=>`
        <label class="op" id="q${i}_${idx}">
          <input type="radio" name="q${i}" value="${idx}">
          ${letter(idx)}. ${op}
        </label>`).join("")}
      <div class="ans" id="ans${i}">答案：${letter(item.answer)}. ${item.options[item.answer]}</div>
    `;
    quiz.appendChild(div);
  });
  resetQuiz();
}

initCats();
render();
</script>
